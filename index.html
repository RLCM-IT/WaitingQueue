<!DOCTYPE html>
<html>
  <link rel="stylesheet" href="style.css">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase</title>
  </head>
  <body>

    <div id="loginDiv">
      <h2>Login</h2>
      <input id="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">
      <button id="loginBtn">Login</button>
    </div>

    <div id="toast-container"></div>
    
    <div id="appDiv" style="display:none;">
      <div id="topBar">
        <input id="search" placeholder="Search...">
        <button id="addBtn">Add Entry</button>
        <button id="logoutBtn">Logout</button>
      </div>

      <div id="addForm">
        <input id="add-name" placeholder="Name">
        <input id="add-lastname" placeholder="Lastname">
        <input id="add-mail" placeholder="Mail">

        <div id="add-languages" class="lang-container"></div>

        <button class="btn-primary" onclick="addRow()">Add</button>
        <button class="btn-secondary" onclick="cancelAddRow()">Cancel</button>
      </div>
      <div id="listContainer">
        <h2>Data</h2>
        <ul id="dataList"></ul>
      </div>
    </div>
    
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>

  </body>
</html>
